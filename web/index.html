<!DOCTYPE html>
<html>

<body style="margin:0; overflow:hidden; background:#1a1a1a;">
    <canvas id="canvas" style="display:block; touch-action:none;"></canvas>
    <div id="status" style="position:fixed; top:20px; left:20px; color:white; font-family:sans-serif;">Connecting...
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';

        // Replace with your PC's local IP (e.g., 192.168.1.50)
        const socket = new WebSocket('ws://YOUR_PC_IP:8000/ws/draw');

        socket.onopen = () => status.innerText = "Connected to Tronchosaure";
        socket.onmessage = (e) => status.innerText = e.data;

        let drawing = false;

        function sendCoords(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

            // Draw locally for zero lag
            ctx.lineTo(x, y);
            ctx.stroke();

            // Send to PC in real-time
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ x: Math.round(x), y: Math.round(y) }));
            }
        }

        canvas.addEventListener('pointerdown', (e) => {
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(e.clientX, e.clientY);
        });
        canvas.addEventListener('pointermove', sendCoords);
        window.addEventListener('pointerup', () => drawing = false);
    </script>
</body>

</html>
